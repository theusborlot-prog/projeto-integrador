<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital - Churrascado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lato:wght@400;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="vitrine-body">
    
    <section id="tela-entrada" class="capa-fullscreen">
        <div class="overlay"></div>
        <div class="capa-conteudo">
            <div class="logo-container">
                <i class="fa-solid fa-fire-flame-curved"></i>
            </div>
            <h1>Churrascado</h1>
            <p><i class="fa-solid fa-location-dot"></i> Qualidade & Sabor</p>
            
            <button class="btn-abrir-cardapio" onclick="iniciarCardapio()">
                <i class="fa-solid fa-book-open"></i> Ver Cardápio
            </button>
        </div>
    </section>

    <div id="tela-menu" class="oculto">
        <nav id="menu-categorias" class="nav-categorias-sticky">
            </nav>

        <main class="container-vitrine">
            <div id="lista-produtos" class="layout-vitrine">
                
                <div class="lista-mobile-produtos" id="skeleton-container">
                    <div class="skeleton-card">
                        <div class="skeleton-img anim-skeleton"></div>
                        <div class="skeleton-info">
                            <div class="skeleton-text anim-skeleton"></div>
                            <div class="skeleton-text short anim-skeleton"></div>
                        </div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-img anim-skeleton"></div>
                        <div class="skeleton-info">
                            <div class="skeleton-text anim-skeleton"></div>
                            <div class="skeleton-text short anim-skeleton"></div>
                        </div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-img anim-skeleton"></div>
                        <div class="skeleton-info">
                            <div class="skeleton-text anim-skeleton"></div>
                            <div class="skeleton-text short anim-skeleton"></div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <footer class="footer-vitrine">
            <div class="footer-marca">
                <i class="fa-solid fa-fire-blaze-can"></i>
                <span>Churrascado</span>
            </div>
            <p>© 2026. Todos os direitos reservados.</p>
        </footer>
    </div>

    <div id="container-modal-cliente"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
